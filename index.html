<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google-like Search</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon"> <!-- Ensure the path is correct -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google Logo" class="logo">
        <div class="search-box">
            <input type="text" id="search-input" class="search-input" placeholder="Search Google">
            <i class="fas fa-times clear-btn" id="clear-btn" onclick="clearSearch()"></i>
            <button class="search-btn">Google Search</button>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const clearBtn = document.getElementById('clear-btn');

        function clearSearch() {
            searchInput.value = '';
            clearBtn.style.display = 'none'; // Hide the clear button when input is empty
        }

        searchInput.addEventListener('input', function() {
            if (searchInput.value.length > 0) {
                clearBtn.style.display = 'block'; // Show the clear button when input has text
            } else {
                clearBtn.style.display = 'none'; // Hide the clear button when input is empty
            }
        });

        document.querySelector('.search-btn').onclick = function() {
            const query = searchInput.value;
            if (query) {
                // Redirect to Google search results
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
        };
    </script>
</body>d
</html>
